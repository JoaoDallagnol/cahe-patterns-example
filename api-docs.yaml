openapi: 3.0.3
info:
  title: Product Cache API
  description: >
    A hands-on API for learning and comparing the four main cache patterns:
    Cache-Aside, Read-Through, Write-Through, and Write-Behind.
    Each endpoint is scoped to a single pattern — no endpoint mixes two cache strategies
    unless explicitly noted and justified.
  version: 1.0.0
  contact:
    name: Product Cache API

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Cache-Aside
    description: >
      The application manually controls the cache.
      It checks Redis first; on a miss, it queries the DB and populates Redis itself.
      The DB has no awareness of the cache.
  - name: Read-Through
    description: >
      The cache sits in front of the DB. The application always talks to the cache.
      On a miss, Spring's @Cacheable proxy loads from the DB and stores the result automatically.
      The caller never writes to Redis directly.
  - name: Write-Through
    description: >
      Every write is applied to the DB and Redis synchronously in the same operation.
      The cache is always consistent after a write. Trade-off: higher write latency.
  - name: Write-Behind
    description: >
      The application writes to Redis immediately and returns.
      The DB write is deferred to a background async process.
      Lowest write latency. Trade-off: potential data loss if the app crashes before the flush.
  - name: Cache Management
    description: Cache eviction and flush utilities for manual testing.

paths:

  # -----------------------------------------------------------------------
  # CACHE-ASIDE
  # -----------------------------------------------------------------------

  /products/{id}:
    get:
      tags:
        - Cache-Aside
      summary: Get product by ID
      description: >
        **Pattern: Cache-Aside**

        The application checks Redis for the key `product:{id}`.

        - **HIT**: deserializes and returns the cached value. The DB is never touched.
          Response includes header `X-Cache: HIT`.

        - **MISS**: queries H2, writes the result to Redis with a 5-minute TTL,
          then returns. Response includes header `X-Cache: MISS`.

        The Redis read/write logic is written explicitly in the service layer —
        no Spring abstraction is used here. This is the key contrast with Read-Through.
      operationId: getProductById
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product found
          headers:
            X-Cache:
              description: Indicates whether the response was served from cache or the database.
              schema:
                type: string
                enum: [HIT, MISS]
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Write-Through
      summary: Update product
      description: >
        **Pattern: Write-Through**

        Updates the product in H2 and immediately overwrites `product:{id}` in Redis
        within the same synchronous operation. The TTL is reset.

        Also invalidates `products:all` to prevent the collection cache from serving stale data.

        After this call returns, any subsequent GET will find the fresh value in Redis.
        Stale reads are not possible with this pattern.
      operationId: updateProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '200':
          description: Product updated. DB and cache are now in sync.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Cache Management
      summary: Delete product
      description: >
        Deletes the product from H2 and evicts all related cache keys.

        Two keys are evicted:
        - `product:{id}` — the individual product key
        - `products:all` — the collection key, which would otherwise serve stale data

        Implemented via `@CacheEvict` with `allEntries = false` on the individual key
        and a manual DEL on the collection key.
      operationId: deleteProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Product deleted and cache evicted.
        '404':
          $ref: '#/components/responses/NotFound'

  /products:
    get:
      tags:
        - Cache-Aside
      summary: List all products
      description: >
        **Pattern: Cache-Aside — applied to a collection**

        Same Cache-Aside logic as GET /products/{id}, but the entire list is stored
        under a single key `products:all` with a 2-minute TTL.

        This endpoint exists alongside GET /products/{id} intentionally.
        It introduces the list invalidation problem: any write operation (POST, PUT, DELETE)
        must also evict `products:all`, or the collection will serve stale results.
        This is one of the most common Cache-Aside mistakes in real systems.
      operationId: listProducts
      responses:
        '200':
          description: List of all products
          headers:
            X-Cache:
              description: Indicates whether the response was served from cache or the database.
              schema:
                type: string
                enum: [HIT, MISS]
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'

    post:
      tags:
        - Write-Through
      summary: Create product
      description: >
        **Pattern: Write-Through**

        Inserts the product into H2 and simultaneously writes the result to Redis
        under `product:{id}` with a 5-minute TTL, in the same synchronous operation.

        Also invalidates `products:all` so the next list request reflects the new product.

        This is the creation counterpart to PUT /products/{id}: together they cover the full
        Write-Through lifecycle (insert and update).
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Product created. Written to DB and Redis.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # -----------------------------------------------------------------------
  # READ-THROUGH
  # -----------------------------------------------------------------------

  /products/{id}/read-through:
    get:
      tags:
        - Read-Through
      summary: Get product via @Cacheable (Read-Through)
      description: >
        **Pattern: Read-Through**

        Functionally equivalent to GET /products/{id}, but implemented using
        Spring's `@Cacheable("products")` annotation instead of manual Redis calls.

        On a cache miss, Spring's AOP proxy calls the method body (the DB query)
        and stores the result in Redis automatically. The service method contains
        zero Redis code — it is pure business logic.

        This endpoint exists separately from GET /products/{id} so you can compare
        the two implementations side-by-side:
        - Cache-Aside: you write `redis.get`, `redis.setEx` explicitly
        - Read-Through: Spring's proxy does it transparently via `@Cacheable`

        Both use Redis as the cache store. The pattern difference is in who manages
        the cache population logic.
      operationId: getProductReadThrough
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product found (from cache or DB, transparently)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # -----------------------------------------------------------------------
  # WRITE-BEHIND
  # -----------------------------------------------------------------------

  /products/{id}/write-behind:
    put:
      tags:
        - Write-Behind
      summary: Update product asynchronously (Write-Behind)
      description: >
        **Pattern: Write-Behind**

        Updates Redis immediately and returns `202 Accepted` before the DB is written.
        The DB update is dispatched to a background thread via `@Async` and executes
        approximately 2 seconds after the response is returned.

        The 202 status code is intentional: it signals that the request was accepted
        but persistence is not yet complete. This is the observable contract of Write-Behind.

        To observe the lag between cache and DB, call GET /products/{id}/sync-status
        immediately after this endpoint and watch the status transition from
        PENDING to SYNCED.
      operationId: updateProductWriteBehind
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '202':
          description: >
            Accepted. Redis updated immediately. DB write is pending in background.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /products/{id}/sync-status:
    get:
      tags:
        - Write-Behind
      summary: Check async DB flush status for a product
      description: >
        **Pattern: Write-Behind — observability endpoint**

        Returns the synchronization state between the Redis cache and the H2 database
        for a given product, after a Write-Behind update.

        This endpoint exists to make the Write-Behind lag visible.
        Without it, the async DB flush is an invisible background event.
        With it, you can call PUT /products/{id}/write-behind, then poll this endpoint
        and watch the status flip from PENDING to SYNCED in real time from Postman.

        States:
        - **PENDING**: Redis has been updated, DB write has not yet completed.
        - **SYNCED**: DB has been updated by the background flush.
      operationId: getProductSyncStatus
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Sync status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # -----------------------------------------------------------------------
  # CACHE MANAGEMENT
  # -----------------------------------------------------------------------

  /cache:
    delete:
      tags:
        - Cache Management
      summary: Flush all cache entries
      description: >
        Executes FLUSHDB on the Redis connection used by this application.
        Removes all keys across all patterns.

        This endpoint exists to support manual testing: when studying patterns,
        you need to force a cache miss to observe the full request flow.
        Calling this from Postman avoids having to switch to a Redis CLI between tests.

        **Do not expose in production.**
      operationId: flushCache
      responses:
        '204':
          description: All cache entries flushed.

# -----------------------------------------------------------------------
# COMPONENTS
# -----------------------------------------------------------------------

components:

  parameters:
    ProductId:
      name: id
      in: path
      required: true
      description: Unique product identifier
      schema:
        type: integer
        format: int64
        example: 1

  schemas:

    ProductRequest:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: Mechanical Keyboard
        price:
          type: number
          format: decimal
          minimum: 0.01
          example: 249.99
        category:
          type: string
          maxLength: 50
          example: Electronics
        stock:
          type: integer
          minimum: 0
          example: 42

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: Mechanical Keyboard
        price:
          type: number
          format: decimal
          example: 249.99
        category:
          type: string
          example: Electronics
        stock:
          type: integer
          example: 42
        createdAt:
          type: string
          format: date-time
          example: "2025-03-12T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-03-12T11:30:00Z"

    SyncStatusResponse:
      type: object
      properties:
        productId:
          type: integer
          format: int64
          example: 1
        status:
          type: string
          enum: [PENDING, SYNCED]
          description: >
            PENDING = Redis updated, DB write not yet complete.
            SYNCED = DB has been flushed by the background thread.
          example: PENDING
        cachedAt:
          type: string
          format: date-time
          description: Timestamp when Redis was written.
          example: "2025-03-12T11:30:00Z"
        persistedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the DB was updated. Null while status is PENDING.
          example: null

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 404
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: Product with id 99 not found
        timestamp:
          type: string
          format: date-time
          example: "2025-03-12T11:30:00Z"

  responses:
    NotFound:
      description: Product not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'